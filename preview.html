<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Step by Step - podglad motywu</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24333f;
      --muted: #64727d;
      --line: #dfe7ec;
      --surface: #f7fafb;
      --accent: #2f7f8f;
      --paper: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--surface);
      line-height: 1.5;
    }

    header {
      padding: 40px 24px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .intro {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 28px;
    }

    figure {
      margin: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
    }

    figcaption {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      font-weight: 700;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #eef3f5;
    }

    .note {
      margin-top: 24px;
      padding: 16px;
      border-left: 4px solid var(--accent);
      background: var(--paper);
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header>
    <div class="intro">
      <h1>Step by Step</h1>
      <p>Statyczny podglad motywu WordPress do publikacji przez GitHub Pages.</p>
    </div>
  </header>

  <main>
    <section class="grid" aria-label="Zrzuty ekranu motywu">
      <figure>
        <figcaption>Widok desktop</figcaption>
        <img src="output/theme-qa/desktop-layout-v2.png" alt="Podglad strony glownej na desktopie">
      </figure>
      <figure>
        <figcaption>Widok mobile</figcaption>
        <img src="output/theme-qa/mobile-layout-v2.png" alt="Podglad strony glownej na telefonie">
      </figure>
      <figure>
        <figcaption>Karty oferty</figcaption>
        <img src="output/theme-qa/offer-cards-v4.png" alt="Podglad kart oferty">
      </figure>
      <figure>
        <figcaption>Specjalisci</figcaption>
        <img src="output/theme-qa/specialists-layout-v3.png" alt="Podglad sekcji specjalistow">
      </figure>
    </section>

    <p class="note">
      GitHub Pages pokazuje statyczny podglad. Pelny motyw PHP wymaga WordPressa,
      np. lokalnego Dockera, hostingu WordPress albo tymczasowego srodowiska testowego.
    </p>
  </main>
</body>
</html>
